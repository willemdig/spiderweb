<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digdir økosystem</title>
  <noscript>
    <meta http-equiv="refresh" content="0; url=index_focus.html" />
  </noscript>
  <script>
    window.location.replace("index_focus.html");
  </script>
  <style>
    :root {
      --page-top: #f6f1e7;
      --page-bottom: #e3efe9;
      --panel: rgba(255, 252, 245, 0.94);
      --panel-border: rgba(121, 108, 89, 0.16);
      --ink: #22313a;
      --muted: #67747a;
      --web: rgba(34, 49, 58, 0.12);
      --edge-direct: rgba(13, 92, 99, 0.28);
      --edge-direct-active: rgba(13, 92, 99, 0.86);
      --edge-proxy: rgba(192, 86, 33, 0.2);
      --edge-proxy-active: rgba(192, 86, 33, 0.78);
      --edge-dim: rgba(34, 49, 58, 0.06);
      --identity: #0f766e;
      --register: #8a6f00;
      --infrastructure: #355070;
      --service: #c05621;
      --glow: 0 28px 64px rgba(35, 43, 47, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(192, 86, 33, 0.11), transparent 26%),
        linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .shell {
      border: 1px solid var(--panel-border);
      border-radius: 32px;
      background: var(--panel);
      box-shadow: var(--glow);
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
      gap: 20px;
      padding: 24px 24px 18px;
      border-bottom: 1px solid rgba(121, 108, 89, 0.12);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #0d5c63;
    }

    .intro {
      margin: 12px 0 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .meta-panels {
      display: grid;
      gap: 14px;
    }

    .panel {
      padding: 14px 16px;
      border: 1px solid rgba(121, 108, 89, 0.12);
      border-radius: 18px;
      background: rgba(255, 252, 245, 0.78);
    }

    .panel-title {
      margin: 0 0 10px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend-grid {
      display: grid;
      gap: 8px;
    }

    .legend-item,
    .relation-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.97rem;
    }

    .legend-marker {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .legend-marker circle,
    .legend-marker rect,
    .legend-marker polygon {
      stroke: rgba(34, 49, 58, 0.18);
      stroke-width: 1;
    }

    .relation-line {
      width: 28px;
      height: 0;
      border-top: 3px solid var(--edge-direct-active);
      flex: 0 0 auto;
      border-radius: 999px;
    }

    .relation-line.proxy {
      border-top-color: var(--edge-proxy-active);
      border-top-style: dashed;
    }

    .focus-wrap {
      padding: 0 24px 20px;
    }

    .focus-panel {
      display: grid;
      gap: 10px;
      padding: 16px 18px;
      border: 1px solid rgba(121, 108, 89, 0.12);
      border-radius: 20px;
      background: rgba(255, 252, 245, 0.8);
    }

    .focus-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px 16px;
    }

    .focus-title {
      margin: 0;
      font-size: 1.26rem;
      color: #0d5c63;
    }

    .focus-meta {
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .focus-copy {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .focus-groups {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .focus-group {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(244, 240, 232, 0.7);
    }

    .focus-group h3 {
      margin: 0 0 8px;
      font-size: 0.96rem;
      color: var(--ink);
    }

    .focus-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      font-size: 0.94rem;
      color: var(--muted);
    }

    .focus-list strong {
      color: var(--ink);
    }

    .canvas-wrap {
      padding: 4px 18px 22px;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .ring,
    .spoke {
      pointer-events: none;
    }

    .ring {
      fill: none;
      stroke: var(--web);
      stroke-width: 1.3;
      stroke-dasharray: 6 8;
      transition: opacity 180ms ease;
    }

    .spoke {
      stroke: var(--web);
      stroke-width: 1.15;
      transition: opacity 180ms ease;
    }

    .edge {
      fill: none;
      stroke-linecap: round;
      stroke-width: 3.2;
      transition: opacity 180ms ease, stroke 180ms ease, stroke-width 180ms ease;
      pointer-events: none;
    }

    .edge.direct {
      stroke: var(--edge-direct);
    }

    .edge.proxy {
      stroke: var(--edge-proxy);
      stroke-dasharray: 10 8;
    }

    .edge.active.direct {
      stroke: var(--edge-direct-active);
      stroke-width: 4.9;
      opacity: 1;
    }

    .edge.active.proxy {
      stroke: var(--edge-proxy-active);
      stroke-width: 4.4;
      opacity: 1;
    }

    .edge.dim {
      stroke: var(--edge-dim);
      opacity: 1;
    }

    .edge.hidden {
      opacity: 0;
    }

    .node {
      cursor: pointer;
      transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1), opacity 180ms ease;
    }

    .node-shape {
      stroke: rgba(34, 49, 58, 0.22);
      stroke-width: 2;
      filter: drop-shadow(0 10px 18px rgba(35, 43, 47, 0.12));
      transition: transform 220ms ease, stroke 180ms ease, opacity 180ms ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .node-label {
      fill: var(--ink);
      dominant-baseline: middle;
      pointer-events: none;
      transition: font-size 180ms ease, font-weight 180ms ease, opacity 180ms ease;
    }

    .node.active .node-shape,
    .node.focus-center .node-shape {
      stroke: rgba(34, 49, 58, 0.42);
      stroke-width: 3;
      transform: scale(1.18);
    }

    .node.related .node-shape {
      stroke: rgba(34, 49, 58, 0.3);
    }

    .node.dim {
      opacity: 0.24;
    }

    .node.hidden {
      opacity: 0.1;
    }

    .node:not(.dim):not(.hidden):hover .node-shape {
      transform: scale(1.08);
    }

    .identity {
      fill: var(--identity);
    }

    .register {
      fill: var(--register);
    }

    .infrastructure {
      fill: var(--infrastructure);
    }

    .service {
      fill: var(--service);
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      main {
        padding: 12px;
      }

      .shell {
        border-radius: 24px;
      }

      .topbar,
      .focus-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }

      .focus-groups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Digdir</p>
          <h1>økosystem</h1>
          <p class="intro">
            Klikk på en løsning for å sette den i sentrum. Heltrukne linjer viser direkte koblinger,
            mens stiplede linjer viser indirekte eller proxy-baserte relasjoner.
          </p>
        </div>
        <div class="meta-panels">
          <section class="panel" aria-label="Kategori">
            <p class="panel-title">Kategori</p>
            <div class="legend-grid" id="legend-list"></div>
          </section>
          <section class="panel" aria-label="Relasjonstyper">
            <p class="panel-title">Relasjonstype</p>
            <div class="legend-grid">
              <div class="relation-item"><span class="relation-line"></span><span>Direkte relasjon</span></div>
              <div class="relation-item"><span class="relation-line proxy"></span><span>Indirekte / proxy</span></div>
            </div>
          </section>
        </div>
      </header>

      <div class="focus-wrap">
        <section class="focus-panel" id="focus-panel" aria-live="polite"></section>
      </div>

      <div class="canvas-wrap">
        <svg id="viz" viewBox="0 0 1200 1040" role="img" aria-label="Interaktiv spiderweb-visualisering av Digdirs fellesløsninger"></svg>
      </div>
    </section>
  </main>

  <script>
    const nodes = {
      "ID-porten": { category: "identity" },
      "MinID": { category: "identity" },
      "Altinn": { category: "service" },
      "KRR": { category: "register" },
      "Digital postkasse": { category: "service" },
      "eSignering": { category: "service" },
      "eFormidling": { category: "infrastructure" },
      "Maskinporten": { category: "infrastructure" },
      "eInnsyn": { category: "service" },
      "Offentlige tjenester": { category: "service" }
    };

    const edges = [
      { source: "MinID", target: "ID-porten", label: "eID i" },
      { source: "Altinn", target: "ID-porten", label: "innlogging via" },
      { source: "eSignering", target: "ID-porten", label: "signering/innlogging via" },
      { source: "Offentlige tjenester", target: "ID-porten", label: "innlogging via" },
      { source: "Digital postkasse", target: "KRR", label: "bruker kontaktdata fra" },
      { source: "Altinn", target: "KRR", label: "varsling/kontaktdata" },
      { source: "eSignering", target: "KRR", label: "kontakt-/varslingsflyt" },
      { source: "eFormidling", target: "Maskinporten", label: "maskin-til-maskin" },
      { source: "Altinn", target: "Maskinporten", label: "integrasjon via" },
      { source: "eInnsyn", target: "ID-porten", label: "innlogging via" },
      { source: "Digital postkasse", target: "ID-porten", label: "tilgang via" }
    ];

    const categoryStyles = {
      identity: { label: "Identity", colorClass: "identity", shape: "circle" },
      register: { label: "Register", colorClass: "register", shape: "square" },
      infrastructure: { label: "Infrastructure", colorClass: "infrastructure", shape: "diamond" },
      service: { label: "Service", colorClass: "service", shape: "triangle" }
    };

    const svg = document.getElementById("viz");
    const legendList = document.getElementById("legend-list");
    const svgNs = "http://www.w3.org/2000/svg";
    const center = { x: 600, y: 600 };
    const radius = 360;
    const nodeSize = 24;
    const legendSize = nodeSize * 0.5;
    const positions = computePositions(Object.keys(nodes));
    let activeNode = null;

    const layers = {
      rings: createSvgElement("g"),
      spokes: createSvgElement("g"),
      edges: createSvgElement("g"),
      center: createSvgElement("g"),
      nodes: createSvgElement("g")
    };

    Object.values(layers).forEach((layer) => svg.appendChild(layer));

    drawRings([0.28, 0.52, 0.76, 1]);
    drawSpokes();
    const edgeElements = drawEdges();
    drawCenter();
    const nodeElements = drawNodes();
    drawLegend();
    updateSelection(null);

    svg.addEventListener("click", (event) => {
      if (event.target === svg) {
        updateSelection(null);
      }
    });

    function computePositions(nodeNames) {
      const map = {};
      const total = nodeNames.length;

      nodeNames.forEach((name, index) => {
        const angle = ((90 - (360 * index) / total) * Math.PI) / 180;
        map[name] = {
          x: center.x + radius * Math.cos(angle),
          y: center.y - radius * Math.sin(angle)
        };
      });

      return map;
    }

    function createSvgElement(tag, attributes = {}) {
      const element = document.createElementNS(svgNs, tag);
      Object.entries(attributes).forEach(([key, value]) => {
        element.setAttribute(key, value);
      });
      return element;
    }

    function drawRings(levels) {
      levels.forEach((level) => {
        const ring = createSvgElement("circle", {
          cx: center.x,
          cy: center.y,
          r: radius * level,
          class: "ring"
        });
        layers.rings.appendChild(ring);
      });
    }

    function drawSpokes() {
      Object.values(positions).forEach((point) => {
        const spoke = createSvgElement("line", {
          x1: center.x,
          y1: center.y,
          x2: point.x,
          y2: point.y,
          class: "spoke"
        });
        layers.spokes.appendChild(spoke);
      });
    }

    function drawEdges() {
      return edges.map((edge) => {
        const from = positions[edge.source];
        const to = positions[edge.target];
        const line = createSvgElement("line", {
          x1: from.x,
          y1: from.y,
          x2: to.x,
          y2: to.y,
          class: "edge"
        });

        line.dataset.source = edge.source;
        line.dataset.target = edge.target;
        line.dataset.label = edge.label;
        layers.edges.appendChild(line);
        return line;
      });
    }

    function drawCenter() {
      const star = createSvgElement("polygon", {
        points: starPoints(center.x, center.y, 58, 28, 5),
        class: "center-mark"
      });
      const label = createSvgElement("text", {
        x: center.x,
        y: center.y + 8,
        class: "center-label"
      });

      label.textContent = "Digdir økosystem";
      layers.center.appendChild(star);
      layers.center.appendChild(label);
    }

    function drawNodes() {
      return Object.entries(nodes).reduce((map, [name, meta]) => {
        const point = positions[name];
        const group = createSvgElement("g", {
          class: `node ${meta.category}`,
          tabindex: "0",
          role: "button",
          "aria-label": `${name}. Click to highlight connected lines.`
        });

        group.dataset.name = name;
        group.appendChild(createShape(meta.category, point.x, point.y, nodeSize, "node-shape"));

        const label = createSvgElement("text", {
          x: point.x + (point.x >= center.x ? nodeSize + 12 : -(nodeSize + 12)),
          y: point.y,
          "text-anchor": point.x >= center.x ? "start" : "end",
          class: "node-label"
        });
        label.textContent = name;
        group.appendChild(label);

        group.addEventListener("click", (event) => {
          event.stopPropagation();
          updateSelection(activeNode === name ? null : name);
        });

        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            updateSelection(activeNode === name ? null : name);
          }
        });

        layers.nodes.appendChild(group);
        map[name] = group;
        return map;
      }, {});
    }

    function drawLegend() {
      Object.entries(categoryStyles).forEach(([key, style]) => {
        const item = document.createElement("li");
        item.className = "legend-item";

        const marker = document.createElementNS(svgNs, "svg");
        marker.setAttribute("viewBox", "0 0 24 24");
        marker.setAttribute("class", "legend-marker");
        marker.appendChild(createShape(key, 12, 12, legendSize, style.colorClass));

        const text = document.createElement("span");
        text.textContent = style.label;

        item.appendChild(marker);
        item.appendChild(text);
        legendList.appendChild(item);
      });
    }

    function createShape(category, x, y, size, className) {
      const style = categoryStyles[category];
      let shape;

      if (style.shape === "circle") {
        shape = createSvgElement("circle", {
          cx: x,
          cy: y,
          r: size,
          class: `${className} ${style.colorClass}`
        });
      } else if (style.shape === "square") {
        shape = createSvgElement("rect", {
          x: x - size,
          y: y - size,
          width: size * 2,
          height: size * 2,
          rx: 5,
          class: `${className} ${style.colorClass}`
        });
      } else if (style.shape === "diamond") {
        shape = createSvgElement("polygon", {
          points: `${x},${y - size} ${x + size},${y} ${x},${y + size} ${x - size},${y}`,
          class: `${className} ${style.colorClass}`
        });
      } else {
        shape = createSvgElement("polygon", {
          points: `${x},${y - size} ${x + size * 0.92},${y + size * 0.82} ${x - size * 0.92},${y + size * 0.82}`,
          class: `${className} ${style.colorClass}`
        });
      }

      return shape;
    }

    function starPoints(cx, cy, outerRadius, innerRadius, spikes) {
      const step = Math.PI / spikes;
      const points = [];
      let rotation = -Math.PI / 2;

      for (let i = 0; i < spikes; i += 1) {
        points.push(`${cx + Math.cos(rotation) * outerRadius},${cy + Math.sin(rotation) * outerRadius}`);
        rotation += step;
        points.push(`${cx + Math.cos(rotation) * innerRadius},${cy + Math.sin(rotation) * innerRadius}`);
        rotation += step;
      }

      return points.join(" ");
    }

    function updateSelection(name) {
      activeNode = name;

      edgeElements.forEach((edge) => {
        const isConnected = name && (edge.dataset.source === name || edge.dataset.target === name);
        edge.classList.toggle("active", Boolean(isConnected));
        edge.classList.toggle("dim", Boolean(name && !isConnected));
      });

      Object.entries(nodeElements).forEach(([nodeName, group]) => {
        const isRelated = name && edges.some((edge) =>
          (edge.source === name && edge.target === nodeName) ||
          (edge.target === name && edge.source === nodeName)
        );

        group.classList.toggle("active", nodeName === name);
        group.classList.toggle("related", Boolean(isRelated));
        group.classList.toggle("dim", Boolean(name && nodeName !== name && !isRelated));
      });
    }
  </script>
</body>
</html>
