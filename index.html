<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digdir økosystem</title>
  <style>
    :root {
      --page-top: #f6f1e7;
      --page-bottom: #e3efe9;
      --panel: rgba(255, 252, 245, 0.94);
      --panel-border: rgba(121, 108, 89, 0.16);
      --ink: #22313a;
      --muted: #67747a;
      --web: rgba(34, 49, 58, 0.12);
      --edge-direct: rgba(13, 92, 99, 0.28);
      --edge-direct-active: rgba(13, 92, 99, 0.86);
      --edge-proxy: rgba(192, 86, 33, 0.2);
      --edge-proxy-active: rgba(192, 86, 33, 0.78);
      --edge-dim: rgba(34, 49, 58, 0.06);
      --identity: #0f766e;
      --register: #8a6f00;
      --infrastructure: #355070;
      --service: #c05621;
      --glow: 0 28px 64px rgba(35, 43, 47, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(192, 86, 33, 0.11), transparent 26%),
        linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .shell {
      border: 1px solid var(--panel-border);
      border-radius: 32px;
      background: var(--panel);
      box-shadow: var(--glow);
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
      gap: 20px;
      padding: 24px 24px 18px;
      border-bottom: 1px solid rgba(121, 108, 89, 0.12);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #0d5c63;
    }

    .intro {
      margin: 12px 0 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .meta-panels {
      display: grid;
      gap: 14px;
    }

    .panel {
      padding: 14px 16px;
      border: 1px solid rgba(121, 108, 89, 0.12);
      border-radius: 18px;
      background: rgba(255, 252, 245, 0.78);
    }

    .panel-title {
      margin: 0 0 10px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend-grid {
      display: grid;
      gap: 8px;
    }

    .legend-item,
    .relation-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.97rem;
    }

    .legend-marker {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .legend-marker circle,
    .legend-marker rect,
    .legend-marker polygon {
      stroke: rgba(34, 49, 58, 0.18);
      stroke-width: 1;
    }

    .relation-line {
      width: 28px;
      height: 0;
      border-top: 3px solid var(--edge-direct-active);
      flex: 0 0 auto;
      border-radius: 999px;
    }

    .relation-line.proxy {
      border-top-color: var(--edge-proxy-active);
      border-top-style: dashed;
    }

    .focus-wrap {
      padding: 0 24px 20px;
    }

    .focus-panel {
      display: grid;
      gap: 10px;
      padding: 16px 18px;
      border: 1px solid rgba(121, 108, 89, 0.12);
      border-radius: 20px;
      background: rgba(255, 252, 245, 0.8);
    }

    .focus-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px 16px;
    }

    .focus-title {
      margin: 0;
      font-size: 1.26rem;
      color: #0d5c63;
    }

    .focus-meta {
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .focus-copy {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .focus-groups {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .focus-group {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(244, 240, 232, 0.7);
    }

    .focus-group h3 {
      margin: 0 0 8px;
      font-size: 0.96rem;
      color: var(--ink);
    }

    .focus-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      font-size: 0.94rem;
      color: var(--muted);
    }

    .focus-list strong {
      color: var(--ink);
    }

    .canvas-wrap {
      padding: 4px 18px 22px;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .ring,
    .spoke {
      pointer-events: none;
    }

    .ring {
      fill: none;
      stroke: var(--web);
      stroke-width: 1.3;
      stroke-dasharray: 6 8;
      transition: opacity 180ms ease;
    }

    .spoke {
      stroke: var(--web);
      stroke-width: 1.15;
      transition: opacity 180ms ease;
    }

    .edge {
      fill: none;
      stroke-linecap: round;
      stroke-width: 3.2;
      transition: opacity 180ms ease, stroke 180ms ease, stroke-width 180ms ease;
      pointer-events: none;
    }

    .edge.direct {
      stroke: var(--edge-direct);
    }

    .edge.proxy {
      stroke: var(--edge-proxy);
      stroke-dasharray: 10 8;
    }

    .edge.active.direct {
      stroke: var(--edge-direct-active);
      stroke-width: 4.9;
      opacity: 1;
    }

    .edge.active.proxy {
      stroke: var(--edge-proxy-active);
      stroke-width: 4.4;
      opacity: 1;
    }

    .edge.dim {
      stroke: var(--edge-dim);
      opacity: 1;
    }

    .edge.hidden {
      opacity: 0;
    }

    .node {
      cursor: pointer;
      transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1), opacity 180ms ease;
    }

    .node-shape {
      stroke: rgba(34, 49, 58, 0.22);
      stroke-width: 2;
      filter: drop-shadow(0 10px 18px rgba(35, 43, 47, 0.12));
      transition: transform 220ms ease, stroke 180ms ease, opacity 180ms ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .node-label {
      fill: var(--ink);
      dominant-baseline: middle;
      pointer-events: none;
      transition: font-size 180ms ease, font-weight 180ms ease, opacity 180ms ease;
    }

    .node.active .node-shape,
    .node.focus-center .node-shape {
      stroke: rgba(34, 49, 58, 0.42);
      stroke-width: 3;
      transform: scale(1.18);
    }

    .node.related .node-shape {
      stroke: rgba(34, 49, 58, 0.3);
    }

    .node.dim {
      opacity: 0.24;
    }

    .node.hidden {
      opacity: 0.1;
    }

    .node:not(.dim):not(.hidden):hover .node-shape {
      transform: scale(1.08);
    }

    .identity {
      fill: var(--identity);
    }

    .register {
      fill: var(--register);
    }

    .infrastructure {
      fill: var(--infrastructure);
    }

    .service {
      fill: var(--service);
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      main {
        padding: 12px;
      }

      .shell {
        border-radius: 24px;
      }

      .topbar,
      .focus-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }

      .focus-groups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Digdir</p>
          <h1>økosystem</h1>
          <p class="intro">
            Klikk på en løsning for å sette den i sentrum. Heltrukne linjer viser direkte koblinger,
            mens stiplede linjer viser indirekte eller proxy-baserte relasjoner.
          </p>
        </div>
        <div class="meta-panels">
          <section class="panel" aria-label="Kategori">
            <p class="panel-title">Kategori</p>
            <div class="legend-grid" id="legend-list"></div>
          </section>
          <section class="panel" aria-label="Relasjonstyper">
            <p class="panel-title">Relasjonstype</p>
            <div class="legend-grid">
              <div class="relation-item"><span class="relation-line"></span><span>Direkte relasjon</span></div>
              <div class="relation-item"><span class="relation-line proxy"></span><span>Indirekte / proxy</span></div>
            </div>
          </section>
        </div>
      </header>

      <div class="focus-wrap">
        <section class="focus-panel" id="focus-panel" aria-live="polite"></section>
      </div>

      <div class="canvas-wrap">
        <svg id="viz" viewBox="0 0 1200 1040" role="img" aria-label="Interaktiv spiderweb-visualisering av Digdirs fellesløsninger"></svg>
      </div>
    </section>
  </main>

  <script>
    const nodes = {
      "ID-porten": { category: "identity" },
      "MinID": { category: "identity" },
      "Altinn": { category: "service" },
      "KRR": { category: "register" },
      "Digital postkasse": { category: "service" },
      "eSignering": { category: "service" },
      "eFormidling": { category: "infrastructure" },
      "Maskinporten": { category: "infrastructure" },
      "eInnsyn": { category: "service" },
      "Offentlige tjenester": { category: "service" }
    };

    const edges = [
      { source: "MinID", target: "ID-porten", label: "eID i", kind: "direct" },
      { source: "Altinn", target: "ID-porten", label: "innlogging via", kind: "direct" },
      { source: "eSignering", target: "ID-porten", label: "signering/innlogging via", kind: "direct" },
      { source: "Offentlige tjenester", target: "ID-porten", label: "innlogging via", kind: "direct" },
      { source: "Digital postkasse", target: "KRR", label: "bruker kontaktdata fra", kind: "direct" },
      { source: "eSignering", target: "KRR", label: "kontakt- og varslingsflyt", kind: "direct" },
      { source: "eFormidling", target: "Maskinporten", label: "maskin-til-maskin", kind: "direct" },
      { source: "Altinn", target: "Maskinporten", label: "integrasjon via", kind: "direct" },
      { source: "eInnsyn", target: "ID-porten", label: "innlogging via", kind: "direct" },
      { source: "Digital postkasse", target: "ID-porten", label: "tilgang via", kind: "direct" },
      { source: "Altinn", target: "KRR", label: "via Altinn autorisasjon og Altinn melding", kind: "proxy" },
      { source: "Offentlige tjenester", target: "MinID", label: "relatert via ID-porten-flyt", kind: "proxy" },
      { source: "Offentlige tjenester", target: "Altinn", label: "relatert via bruk av Altinn-komponenter", kind: "proxy" },
      { source: "Offentlige tjenester", target: "KRR", label: "relatert via andre fellesløsninger", kind: "proxy" },
      { source: "Offentlige tjenester", target: "Digital postkasse", label: "kan bruke digital postflyt", kind: "proxy" },
      { source: "Offentlige tjenester", target: "eSignering", label: "kan bruke signeringsflyt", kind: "proxy" },
      { source: "Offentlige tjenester", target: "eFormidling", label: "kan bruke formidling via", kind: "proxy" },
      { source: "Offentlige tjenester", target: "Maskinporten", label: "kan bruke system-til-system via", kind: "proxy" },
      { source: "Offentlige tjenester", target: "eInnsyn", label: "kan være koblet via publisering og innsyn", kind: "proxy" }
    ];

    const categoryStyles = {
      identity: { label: "Identitet", colorClass: "identity", shape: "circle" },
      register: { label: "Register", colorClass: "register", shape: "square" },
      infrastructure: { label: "Infrastruktur", colorClass: "infrastructure", shape: "diamond" },
      service: { label: "Tjeneste", colorClass: "service", shape: "triangle" }
    };

    const svg = document.getElementById("viz");
    const legendList = document.getElementById("legend-list");
    const focusPanel = document.getElementById("focus-panel");
    const svgNs = "http://www.w3.org/2000/svg";

    const center = { x: 600, y: 520 };
    const defaultRadius = 350;
    const directRadius = 235;
    const proxyRadius = 345;
    const outerRadius = 430;
    const nodeSize = 24;
    const legendSize = nodeSize * 0.5;

    const nodeNames = Object.keys(nodes);
    const defaultPositions = circularLayout(nodeNames, defaultRadius, 90, 360);
    let activeNode = null;

    const layers = {
      rings: createSvgElement("g"),
      spokes: createSvgElement("g"),
      edges: createSvgElement("g"),
      nodes: createSvgElement("g")
    };

    Object.values(layers).forEach((layer) => svg.appendChild(layer));

    drawRings([0.28, 0.52, 0.76, 1]);
    const spokeElements = drawSpokes();
    const edgeElements = drawEdges();
    const nodeElements = drawNodes();
    drawLegend();
    applyState(null);

    svg.addEventListener("click", (event) => {
      if (event.target === svg) {
        applyState(null);
      }
    });

    function createSvgElement(tag, attributes = {}) {
      const element = document.createElementNS(svgNs, tag);
      Object.entries(attributes).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }

    function circularLayout(names, radius, startAngleDeg, spanDeg) {
      const layout = {};
      const angles = distributedAngles(names.length, startAngleDeg, spanDeg);

      names.forEach((name, index) => {
        layout[name] = pointOnCircle(angles[index], radius);
      });

      return layout;
    }

    function distributedAngles(count, startAngleDeg, spanDeg) {
      if (count === 0) {
        return [];
      }

      if (count === 1) {
        return [startAngleDeg];
      }

      if (spanDeg === 360) {
        return Array.from({ length: count }, (_, index) => startAngleDeg - (360 * index) / count);
      }

      const first = startAngleDeg + spanDeg / 2;
      const step = spanDeg / (count - 1);
      return Array.from({ length: count }, (_, index) => first - step * index);
    }

    function pointOnCircle(angleDeg, radius) {
      const angle = (angleDeg * Math.PI) / 180;
      return {
        x: center.x + radius * Math.cos(angle),
        y: center.y - radius * Math.sin(angle)
      };
    }

    function drawRings(levels) {
      levels.forEach((level) => {
        const ring = createSvgElement("circle", {
          cx: center.x,
          cy: center.y,
          r: defaultRadius * level,
          class: "ring"
        });
        layers.rings.appendChild(ring);
      });
    }

    function drawSpokes() {
      return nodeNames.reduce((map, name) => {
        const spoke = createSvgElement("line", {
          x1: center.x,
          y1: center.y,
          x2: defaultPositions[name].x,
          y2: defaultPositions[name].y,
          class: "spoke"
        });
        layers.spokes.appendChild(spoke);
        map[name] = spoke;
        return map;
      }, {});
    }

    function drawEdges() {
      return edges.map((edge) => {
        const line = createSvgElement("line", {
          class: `edge ${edge.kind}`
        });
        line.dataset.source = edge.source;
        line.dataset.target = edge.target;
        line.dataset.label = edge.label;
        line.dataset.kind = edge.kind;
        layers.edges.appendChild(line);
        return line;
      });
    }

    function drawNodes() {
      return nodeNames.reduce((map, name) => {
        const meta = nodes[name];
        const group = createSvgElement("g", {
          class: `node ${meta.category}`,
          tabindex: "0",
          role: "button",
          "aria-label": `${name}. Klikk for å sette løsningen i sentrum.`
        });

        group.dataset.name = name;
        group.appendChild(createShape(meta.category, 0, 0, nodeSize, "node-shape"));

        const label = createSvgElement("text", {
          class: "node-label"
        });
        label.textContent = name;
        group.appendChild(label);

        group.addEventListener("click", (event) => {
          event.stopPropagation();
          applyState(activeNode === name ? null : name);
        });

        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            applyState(activeNode === name ? null : name);
          }
        });

        layers.nodes.appendChild(group);
        map[name] = { group, label };
        return map;
      }, {});
    }

    function drawLegend() {
      Object.entries(categoryStyles).forEach(([key, style]) => {
        const row = document.createElement("div");
        row.className = "legend-item";

        const marker = document.createElementNS(svgNs, "svg");
        marker.setAttribute("viewBox", "0 0 24 24");
        marker.setAttribute("class", "legend-marker");
        marker.appendChild(createShape(key, 12, 12, legendSize, style.colorClass));

        const text = document.createElement("span");
        text.textContent = style.label;

        row.appendChild(marker);
        row.appendChild(text);
        legendList.appendChild(row);
      });
    }

    function createShape(category, x, y, size, className) {
      const style = categoryStyles[category];

      if (style.shape === "circle") {
        return createSvgElement("circle", {
          cx: x,
          cy: y,
          r: size,
          class: `${className} ${style.colorClass}`
        });
      }

      if (style.shape === "square") {
        return createSvgElement("rect", {
          x: x - size,
          y: y - size,
          width: size * 2,
          height: size * 2,
          rx: 5,
          class: `${className} ${style.colorClass}`
        });
      }

      if (style.shape === "diamond") {
        return createSvgElement("polygon", {
          points: `${x},${y - size} ${x + size},${y} ${x},${y + size} ${x - size},${y}`,
          class: `${className} ${style.colorClass}`
        });
      }

      return createSvgElement("polygon", {
        points: `${x},${y - size} ${x + size * 0.92},${y + size * 0.82} ${x - size * 0.92},${y + size * 0.82}`,
        class: `${className} ${style.colorClass}`
      });
    }

    function relatedEdges(name, kind = null) {
      return edges.filter((edge) => {
        const matchesNode = edge.source === name || edge.target === name;
        return matchesNode && (kind ? edge.kind === kind : true);
      });
    }

    function otherNode(edge, name) {
      return edge.source === name ? edge.target : edge.source;
    }

    function computeFocusLayout(selected) {
      const directNodes = unique(relatedEdges(selected, "direct").map((edge) => otherNode(edge, selected)));
      const proxyNodes = unique(
        relatedEdges(selected, "proxy")
          .map((edge) => otherNode(edge, selected))
          .filter((name) => !directNodes.includes(name))
      );
      const unrelatedNodes = nodeNames.filter((name) => name !== selected && !directNodes.includes(name) && !proxyNodes.includes(name));

      const layout = {};
      layout[selected] = { x: center.x, y: center.y };

      assignCircularPositions(layout, directNodes, directRadius, 90, 300);
      assignCircularPositions(layout, proxyNodes, proxyRadius, 90, 320);
      assignCircularPositions(layout, unrelatedNodes, outerRadius, 90, 330);

      return { layout, directNodes, proxyNodes, unrelatedNodes };
    }

    function assignCircularPositions(target, names, radius, startAngleDeg, spanDeg) {
      const angles = distributedAngles(names.length, startAngleDeg, spanDeg);
      names.forEach((name, index) => {
        target[name] = pointOnCircle(angles[index], radius);
      });
    }

    function unique(values) {
      return [...new Set(values)];
    }

    function applyState(selected) {
      activeNode = selected;

      const layoutInfo = selected
        ? computeFocusLayout(selected)
        : {
            layout: defaultPositions,
            directNodes: [],
            proxyNodes: [],
            unrelatedNodes: []
          };

      updateSpokes(layoutInfo, selected);
      updateEdges(layoutInfo, selected);
      updateNodes(layoutInfo, selected);
      updateFocusPanel(selected);
    }

    function updateSpokes(layoutInfo, selected) {
      nodeNames.forEach((name) => {
        const spoke = spokeElements[name];
        const point = layoutInfo.layout[name];

        spoke.setAttribute("x1", center.x);
        spoke.setAttribute("y1", center.y);
        spoke.setAttribute("x2", point.x);
        spoke.setAttribute("y2", point.y);

        if (!selected) {
          spoke.style.opacity = "1";
          return;
        }

        const isVisible = layoutInfo.directNodes.includes(name) || layoutInfo.proxyNodes.includes(name);
        spoke.style.opacity = isVisible ? "0.38" : "0";
      });
    }

    function updateEdges(layoutInfo, selected) {
      edgeElements.forEach((line, index) => {
        const edge = edges[index];
        const from = layoutInfo.layout[edge.source];
        const to = layoutInfo.layout[edge.target];

        line.setAttribute("x1", from.x);
        line.setAttribute("y1", from.y);
        line.setAttribute("x2", to.x);
        line.setAttribute("y2", to.y);

        line.classList.remove("active", "dim", "hidden");

        if (!selected) {
          if (edge.kind === "proxy") {
            line.classList.add("hidden");
          }
          return;
        }

        const touchesSelected = edge.source === selected || edge.target === selected;
        if (touchesSelected) {
          line.classList.add("active");
          return;
        }

        line.classList.add("dim");
      });
    }

    function updateNodes(layoutInfo, selected) {
      nodeNames.forEach((name) => {
        const { group, label } = nodeElements[name];
        const point = layoutInfo.layout[name];
        const isActive = selected === name;
        const isDirect = layoutInfo.directNodes.includes(name);
        const isProxy = layoutInfo.proxyNodes.includes(name);
        const isUnrelated = layoutInfo.unrelatedNodes.includes(name);

        group.setAttribute("transform", `translate(${point.x} ${point.y})`);
        group.classList.remove("active", "related", "dim", "hidden", "focus-center");

        if (!selected) {
          positionLabel(label, point, false);
          label.style.fontSize = "22px";
          label.style.fontWeight = "400";
          return;
        }

        if (isActive) {
          group.classList.add("active", "focus-center");
          label.style.fontSize = "28px";
          label.style.fontWeight = "700";
          positionLabel(label, point, true);
          return;
        }

        if (isDirect || isProxy) {
          group.classList.add("related");
          label.style.fontSize = isDirect ? "22px" : "20px";
          label.style.fontWeight = isDirect ? "600" : "400";
          positionLabel(label, point, false);
          return;
        }

        if (isUnrelated) {
          group.classList.add("dim");
          label.style.fontSize = "17px";
          label.style.fontWeight = "400";
          positionLabel(label, point, false);
        }
      });
    }

    function positionLabel(label, point, centered) {
      if (centered) {
        label.setAttribute("x", 0);
        label.setAttribute("y", 52);
        label.setAttribute("text-anchor", "middle");
        return;
      }

      const offset = point.x >= center.x ? nodeSize + 12 : -(nodeSize + 12);
      label.setAttribute("x", offset);
      label.setAttribute("y", 0);
      label.setAttribute("text-anchor", point.x >= center.x ? "start" : "end");
    }

    function updateFocusPanel(selected) {
      if (!selected) {
        focusPanel.innerHTML = `
          <div class="focus-head">
            <h2 class="focus-title">Oversikt</h2>
            <div class="focus-meta">Standardvisning</div>
          </div>
          <p class="focus-copy">
            Standardvisningen viser de tydeligste direkte koblingene. Klikk på en løsning for å flytte den til sentrum
            og se både direkte og indirekte relasjoner uten at proxy-forhold ser ut som helt direkte avhengigheter.
          </p>
        `;
        return;
      }

      const direct = relatedEdges(selected, "direct");
      const proxy = relatedEdges(selected, "proxy");

      focusPanel.innerHTML = `
        <div class="focus-head">
          <h2 class="focus-title">${selected} i sentrum</h2>
          <div class="focus-meta">${direct.length} direkte · ${proxy.length} indirekte</div>
        </div>
        <p class="focus-copy">
          Direkte relasjoner ligger nærmest sentrum. Indirekte eller proxy-baserte relasjoner ligger i neste ring
          og tegnes som stiplede forbindelser.
        </p>
        <div class="focus-groups">
          <section class="focus-group">
            <h3>Direkte relasjoner</h3>
            <ul class="focus-list">
              ${renderFocusItems(direct, selected, "Ingen direkte relasjoner registrert i denne visningen.")}
            </ul>
          </section>
          <section class="focus-group">
            <h3>Indirekte / proxy</h3>
            <ul class="focus-list">
              ${renderFocusItems(proxy, selected, "Ingen indirekte relasjoner registrert i denne visningen.")}
            </ul>
          </section>
        </div>
      `;
    }

    function renderFocusItems(relations, selected, emptyText) {
      if (!relations.length) {
        return `<li>${emptyText}</li>`;
      }

      return relations
        .map((edge) => `<li><strong>${otherNode(edge, selected)}</strong>: ${edge.label}</li>`)
        .join("");
    }
  </script>
</body>
</html>
